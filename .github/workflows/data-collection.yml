name: Data Collection Pipeline

on:
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours
  workflow_dispatch: # Enable manual run from the GitHub Actions tab

permissions:
  contents: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Execute Data Collection Script
        env:
          AQI_API_KEY: ${{ secrets.AQI_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python api/collect_and_save_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api/data/live_aqi_dataset.csv api/data/hyderabad_live_weather.csv
          
          # Only commit and push if there are changes to the CSV files
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update AQI and weather telemetry data [skip ci]"
            git push
          else
            echo "No changes in datasets to commit."
          fi
