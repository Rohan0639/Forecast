services:
  - type: web
    name: aqi-prediction-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AQI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: WEATHER_API_KEY
        sync: false   # Set this manually in Render dashboard
    healthCheckPath: /api/stations
    autoDeploy: true
